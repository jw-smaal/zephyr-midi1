CONFIG_USB_HOST_STACK=y
CONFIG_UHC_DRIVER=y
CONFIG_USBH_LOG_LEVEL_INF=y

CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=10240
CONFIG_HEAP_MEM_POOL_SIZE=16384

# USB Host Settings
CONFIG_UHC_XFER_COUNT=8
CONFIG_UHC_BUF_COUNT=16
CONFIG_UHC_BUF_POOL_SIZE=2048
CONFIG_USBH_USB_DEVICE_HEAP=4096
CONFIG_USBH_STACK_SIZE=4096
CONFIG_UHC_NXP_THREAD_STACK_SIZE=2048

# Stack protection
CONFIG_STACK_SENTINEL=y

# MIDI1 related
CONFIG_MIDI1_SERIAL=y
