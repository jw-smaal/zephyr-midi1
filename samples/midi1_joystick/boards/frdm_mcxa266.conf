CONFIG_UHC_NXP_KHCI=y
CONFIG_USBH_LOG_LEVEL_DBG=y
CONFIG_UHC_DRIVER_LOG_LEVEL_DBG=y

# Increase stack sizes
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_USBH_STACK_SIZE=8192
CONFIG_UHC_NXP_THREAD_STACK_SIZE=8192

# Increase memory pools for Host
CONFIG_USBH_USB_DEVICE_HEAP=16384
CONFIG_UHC_BUF_POOL_SIZE=16384
CONFIG_UHC_XFER_COUNT=64
CONFIG_UHC_BUF_COUNT=64
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_HEAP_MEM_POOL_ADD_SIZE_UHC_MCUX=8192
