CONFIG_UHC_NXP_KHCI=y
CONFIG_USBH_LOG_LEVEL_DBG=y
CONFIG_UHC_DRIVER_LOG_LEVEL_DBG=y

# Optimized stack sizes
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_USBH_STACK_SIZE=4096
CONFIG_UHC_NXP_THREAD_STACK_SIZE=2048

# Optimized memory pools for Host
CONFIG_USBH_USB_DEVICE_HEAP=2048
CONFIG_UHC_BUF_POOL_SIZE=4096
CONFIG_UHC_XFER_COUNT=8
CONFIG_UHC_BUF_COUNT=16
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_HEAP_MEM_POOL_ADD_SIZE_UHC_MCUX=4096

# Regulator support for VBUS enable
CONFIG_REGULATOR=y

# Silence ADC warnings (board defconfig enables calibration but not the driver)
CONFIG_LPADC_DO_OFFSET_CALIBRATION=n
