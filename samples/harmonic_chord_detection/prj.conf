# MIDI 1.0 Arpeggiator Application
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_BOOT_BANNER=y

# Driver support
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_MIDI1_SERIAL=y
CONFIG_MIDI1_CLOCK_CNTR=n
CONFIG_MIDI1_HARMONIC=y
CONFIG_COUNTER=n
CONFIG_INPUT=n
CONFIG_INPUT_GPIO_QDEC=n

# Require larger buffers for handling inputs and outputs concurrently
CONFIG_MIDI1_SERIAL_TX_BUF_SIZE=128

# Footprint settings
CONFIG_IDLE_STACK_SIZE=256
CONFIG_ISR_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
