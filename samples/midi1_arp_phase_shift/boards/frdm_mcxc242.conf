# Display support for SSD1306 on MCXC242
CONFIG_I2C=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_DISPLAY_LOG_LEVEL_OFF=y

# Enable Character Framebuffer (text rendering)
CONFIG_CHARACTER_FRAMEBUFFER=y
CONFIG_CHARACTER_FRAMEBUFFER_USE_DEFAULT_FONTS=y

# Memory pool for display allocation (fixes CFB k_malloc error)
CONFIG_HEAP_MEM_POOL_SIZE=1024

# --- Memory & Size Optimizations for MCXC242 (16KB RAM) ---
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_SPI=n
CONFIG_PM=n
CONFIG_BOOT_BANNER=n

# Disable full logging and printk to save RAM buffers and flash
CONFIG_LOG=n
CONFIG_PRINTK=n

# Opt for minimal libc footprint
CONFIG_MINIMAL_LIBC=y

# Stack Size Reductions
CONFIG_ISR_STACK_SIZE=512
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
